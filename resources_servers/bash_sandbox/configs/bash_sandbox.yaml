bash_sandbox_resources_server:
  resources_servers:
    bash_sandbox:
      entrypoint: app.py
      domain: agent
      judge:
        enabled: false
        judge_model_name: gemini-3-pro-preview
        num_trials: 4
        max_concurrent_judgements: 10
        committee_models_root: /lustre/fsw/portfolios/llmservice/users/vadams/committee-model-outputs
        evaluated_outputs_root: /lustre/fsw/portfolios/llmservice/users/vadams/committee-model-outputs
        # committee_models:
        #   - name: committee-nano-v3
        #     elo: 1000
        # OpenAI-compatible path — mutually exclusive with the VertexAI path (gcp_project_id).
        # Set both fields to use the NVIDIA OpenAI endpoint; omit both to use VertexAI.
        nvidia_openai_api_key_env: "NVIDIA_OPENAI_API_KEY"
        nvidia_openai_model: "gcp/google/gemini-3-pro"
      verified: false
bash_sandbox_agent:
  responses_api_agents:
    gdpval_agent:
      entrypoint: app.py
      resources_server:
        type: resources_servers
        name: bash_sandbox_resources_server
      model_server:
        type: responses_api_models
        name: policy_model
      datasets:
        - name: train
          type: train
          jsonl_fpath: resources_servers/bash_sandbox/data/train.jsonl
          num_repeats: 1
          gitlab_identifier:
            dataset_name: bash_sandbox
            version: 0.0.1
            artifact_fpath: train.jsonl
          license: Apache 2.0
        - name: validation
          type: validation
          jsonl_fpath: resources_servers/bash_sandbox/data/validation.jsonl
          num_repeats: 1
          gitlab_identifier:
            dataset_name: bash_sandbox
            version: 0.0.1
            artifact_fpath: validation.jsonl
          license: Apache 2.0
        - name: example
          type: example
          jsonl_fpath: resources_servers/bash_sandbox/data/example.jsonl
          num_repeats: 1
