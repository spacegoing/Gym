reasoning_gym:
  resources_servers:
    reasoning_gym:
      entrypoint: app.py
      domain: knowledge
      description: LangGraph reflection agent compatible with resource servers that do not use tools; provides iterative reflection for diverse agent training data and test time scaling, extensible to use tools or other agent architectures
      value: Iterative test time scaling for improved performance in reasoning tasks
      verified: false

reasoning_gym_langgraph_agent:
  responses_api_agents:
    langgraph_agent:
      entrypoint: reflection_agent.py
      resources_server:
        type: resources_servers
        name: reasoning_gym
      model_server:
        type: responses_api_models
        name: policy_model
      max_reflections: 2
      datasets:
      - name: train
        type: train
        jsonl_fpath: resources_servers/reasoning_gym/data/train_knights_knaves.jsonl
        gitlab_identifier:
          dataset_name: knights_knaves_reasoning_gym
          version: 1.0.0
          artifact_fpath: train_knights_knaves.jsonl
        license: Apache 2.0
